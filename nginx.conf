server {
    listen 80;
    
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html; 
    }

    # Proxy a las peticiones del backend Spring Boot
    location /api/ {
        # Como ambos contenedores corren en la máquina o red Docker,
        # usaremos host.docker.internal para alcanzar el localhost de tu PC local.
        # Si tienes el backend en otro contenedor en la misma red, cámbialo por el nombre del contenedor
        proxy_pass http://host.docker.internal:9090;
        
        # Headers para CORS y proxying
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
