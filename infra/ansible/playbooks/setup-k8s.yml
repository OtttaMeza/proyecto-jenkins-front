- hosts: all
  gather_facts: false

  tasks:

    - name: Install python and sudo
      raw: apt update && apt install -y python3 sudo curl gpg

    - name: Gather facts
      setup:

- hosts: all
  become: true
  tasks:

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Kubernetes key
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
        dest: /tmp/kubernetes.key

    - name: Convert key
      command: gpg --dearmor --batch --yes -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /tmp/kubernetes.key

    - name: Add Kubernetes repo
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /

    - name: Install Kubernetes packages
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

- hosts: master
  become: true
  tasks:

    - name: Disable swap
      command: swapoff -a

    - name: Initialize Kubernetes master
      command: >
        kubeadm init
        --pod-network-cidr=10.244.0.0/16
        --ignore-preflight-errors=all

    - name: Create kube directory
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: 0755

    - name: Copy kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        remote_src: yes
        owner: ubuntu
        group: ubuntu

    - name: Install Flannel network
      shell: kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

- hosts: master
  become: true
  tasks:

    - name: Generate join command
      shell: kubeadm token create --print-join-command
      register: join_command

    - name: Save join command
      set_fact:
        join_cmd: "{{ join_command.stdout }}"

- hosts: workers
  become: true
  tasks:

    - name: Join cluster
      shell: "{{ hostvars['master'].join_cmd }} --ignore-preflight-errors=all"